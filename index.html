            <span class="bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-4 py-2 rounded-full font-medium">Japanese (N2)</span>
        </div>
    </section>

    <footer class="text-center py-10 border-t border-slate-200 dark:border-slate-800 text-slate-400 text-sm">

    <script>
        const translations = {

                experiences: [
                    { company: "NEC (台北內湖)", role: "Android Developer", date: "2024.03 - 現在", desc: "採用 MVI 架構與 Jetpack Compose 開發用戶端 App。負責新功能開發、Bug 修復與效能優化。" },
                    { company: "Clara (東京港區)", role: "Mobile Developer", date: "2022.11 - 2025.01", desc: "利用 KMP 與 CMP 技術開發招聘 App。成功為公司節省了 75% 的行動端開發成本。" },
                    { company: "ZTE (東京中央區)", role: "QA Test Engineer", date: "2019.05 - 2022.11", desc: "使用 QXDM 工具測試 5G 信號與網路品質。針對 Android 手機硬體（如 GPS）及軟體進行深度驗證。" },
                    { company: "Asgard (台北)", role: "Software Engineer", date: "2017.07 - 2019.03", desc: "使用 Java, Spring Boot 與 MySQL 開發後端。維護銀行、股市及保險系統的大型改版計畫。" },

                ],

                    { name: "VibePlayer", url: "https://github.com/encorex32268/VibePlayer", desc: "Compose 開發的簡約音樂播放器，專注於流暢互動。" },
                    { name: "MoneyManagerKMP", url: "https://github.com/encorex32268/MoneyManagerKMP", desc: "KMP 跨平台記帳 App，實踐 iOS/Android 邏輯共享。" },
                    { name: "Jiburi", url: "https://github.com/encorex32268/Jiburi", desc: "吉卜力 API 展示 App，運用現代化架構呈現電影資訊。" },
                    { name: "JPractice", url: "https://github.com/encorex32268/JPractice", desc: "日語五十音練習工具，已在 Google Play 上架運行。" }
                ]
            },
            en: {
                name: "LiHan Chen",
                title: "Android Engineer / KMP Developer",
                expLabel: "Experience",
                projectLabel: "Projects",
                skillLabel: "Core Skills",
                experiences: [
                    { company: "NEC (Taipei)", role: "Android Developer", date: "Mar 2024 - Present", desc: "Developing apps using MVI and Jetpack Compose. Focused on features and bug fixing." },
                    { company: "Clara (Tokyo)", role: "Mobile Developer", date: "Nov 2022 - Jan 2025", desc: "Built recruiting apps using KMP/CMP, saving the company 75% in development costs." },
                    { company: "ZTE (Tokyo)", role: "QA Test Engineer", date: "May 2019 - Nov 2022", desc: "5G signal and network testing via QXDM tools. Verified Android HW/SW features." },
                    { company: "Asgard (Taipei)", role: "Software Engineer", date: "Jul 2017 - Mar 2019", desc: "Backend dev with Java/Spring Boot. Maintained banking and insurance systems." },
                    { company: "Foodomo (Taipei)", role: "Mobile Intern", date: "Jan 2015 - Sep 2015", desc: "Developed Android/iOS apps. Created photo-reward features for Big Data collection." }
                ],
                projects: [

                    { name: "VibePlayer", url: "https://github.com/encorex32268/VibePlayer", desc: "Minimalist music player built with Compose for smooth UI." },

                ]
            },
            jp: {
                name: "チェン リハン (LiHan Chen)",
                title: "Android エンジニア / KMP デベロッパー",
                expLabel: "職務経歴",
                projectLabel: "プロジェクト",
                skillLabel: "スキル",
                experiences: [
                    { company: "NEC (台北)", role: "Android デベロッパー", date: "2024.03 - 現在", desc: "MVI と Jetpack Compose を使用したアプリ開発、バグ修正および機能追加。" },
                    { company: "クララ (東京)", role: "モバイルデベロッパー", date: "2022.11 - 2025.01", desc: "KMP/CMP を導入し、モバイル開発コストを 75% 削減することに成功。" },
                    { company: "ZTE (東京)", role: "QAテストエンジニア", date: "2019.05 - 2022.11", desc: "QXDM を用いた 5G 通信テスト。Android の HW/SW 検証を担当。" },
                    { company: "アスガルド (台北)", role: "ソフトウェアエンジニア", date: "2017.07 - 2019.03", desc: "Java/Spring Boot によるバックエンド開発。金融・保険システムを担当。" },
                    { company: "Foodomo (台北)", role: "開発インターン", date: "2015.01 - 2015.09", desc: "Java/Obj-C でアプリ開発。ビッグデータ収集用の機能を実装。" }
                ],
                projects: [
                    { name: "QRCraft", url: "https://github.com/encorex32268/QRCraft", desc: "Material 3 対応のモダンな QR コードスキャナー。" },
                    { name: "VibePlayer", url: "https://github.com/encorex32268/VibePlayer", desc: "Compose で作成されたシンプルで滑らかな音楽プレイヤー。" },
                    { name: "MoneyManagerKMP", url: "https://github.com/encorex32268/MoneyManagerKMP", desc: "iOS/Android のロジックを共有する KMP 家計簿アプリ。" },
                    { name: "Jiburi", url: "https://github.com/encorex32268/Jiburi", desc: "ジブリ API を活用した映画情報閲覧アプリ。" },
                    { name: "JPractice", url: "https://github.com/encorex32268/JPractice", desc: "日本語五十音の学習ツール。Google Play で公開中。" }
                ]
            }
        };

        function changeLang(lang) {
            const data = translations[lang];
            document.getElementById('name').innerText = data.name;
            document.getElementById('title').innerText = data.title;
            document.getElementById('expLabel').innerHTML = `<i class="fas fa-briefcase text-blue-500"></i> ` + data.expLabel;
            document.getElementById('projectLabel').innerHTML = `<i class="fas fa-code text-blue-500"></i> ` + data.projectLabel;
            document.getElementById('skillLabel').innerText = data.skillLabel;

            document.getElementById('experienceList').innerHTML = data.experiences.map(exp => `
                <div class="relative pl-8 border-l-2 border-slate-200 dark:border-slate-700">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 bg-blue-500 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.4)]"></div>
                    <h3 class="text-xl font-bold dark:text-white">${exp.role}</h3>
                    <p class="text-blue-600 dark:text-blue-400 font-medium">${exp.company} | ${exp.date}</p>
                    <p class="mt-2 text-slate-600 dark:text-slate-400 leading-relaxed">${exp.desc}</p>
                </div>
            `).join('');

            document.getElementById('projectList').innerHTML = data.projects.map(proj => `
                <div class="group border border-slate-200 dark:border-slate-700 p-6 rounded-2xl hover:shadow-xl transition-all hover:-translate-y-1 bg-white dark:bg-slate-800/50">
                    <h3 class="font-bold text-lg mb-2 group-hover:text-blue-500 transition-colors">${proj.name}</h3>
                    <p class="text-slate-600 dark:text-slate-400 text-sm mb-4 h-12 overflow-hidden text-ellipsis">${proj.desc}</p>
                    <a href="${proj.url}" target="_blank" class="inline-flex items-center gap-1 text-blue-500 text-sm font-semibold hover:underline">
                        GitHub Repo <i class="fas fa-external-link-alt text-xs"></i>
                    </a>
                </div>
            `).join('');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        window.onload = () => {
            changeLang('zh');
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        };
    </script>
</body>
</html>
